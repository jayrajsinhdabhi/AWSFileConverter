<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS File Converter</title>
    <link rel="stylesheet" href="styles.css" />
    <!--
      Deploy script injects a config.js here that sets window.__CONFIG__.
      Example content:
        window.__CONFIG__ = { apiUrl: "https://abc123.execute-api.us-east-1.amazonaws.com/prod" };
    -->
    <script src="config.js" onerror="window.__CONFIG__ = {};"></script>
  </head>
  <body>
    <main class="container">
      <section class="card" aria-labelledby="title">
        <h1 id="title">AWS File Converter</h1>
        <p class="subtitle">
          Upload a file, pick a target format, and convert.
        </p>

        <form id="converter-form" class="form" novalidate>
          <label for="file-input">Choose file</label>
          <input
            id="file-input"
            name="file"
            type="file"
            accept=".txt,.csv,.pdf,.jpg,.jpeg,.png,.webp,.gif,.tiff,.avif"
            required
          />

          <label for="format-select">Target format</label>
          <select id="format-select" name="targetFormat" required>
            <option value="" selected disabled>Select a format</option>
            <optgroup label="Document">
              <option value="pdf">PDF</option>
              <option value="txt">TXT</option>
            </optgroup>
            <optgroup label="Image">
              <option value="jpg">JPG</option>
              <option value="png">PNG</option>
              <option value="webp">WebP</option>
            </optgroup>
          </select>

          <button id="convert-button" type="submit">Convert</button>
        </form>

        <section class="download-area" aria-live="polite" aria-atomic="true">
          <h2>Download</h2>
          <p id="download-placeholder">
            Your download link will appear here after conversion.
          </p>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
